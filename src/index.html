<!doctype html>
<html lang="en-CA" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <title>TavernQuill — SillyTavern V3 Card Architect</title>
    <meta name="description" content="TavernQuill is a free, privacy-first SillyTavern V3 character card editor. Runs entirely in your browser — no server, no data upload." />
    <meta property="og:title" content="TavernQuill — SillyTavern V3 Card Architect">
    <meta property="og:description" content="Build and refine LLM character cards with a modern, accessible Angular editor. Full V3 spec support, lorebooks, and PNG metadata — all in-browser.">
    <meta property="og:url" content="https://hockey323.github.io/TavernQuill/">
    <meta property="og:image" content="https://hockey323.github.io/TavernQuill/og-image.png">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="TavernQuill — SillyTavern V3 Card Architect">
    <meta name="twitter:description" content="A privacy-first, client-side character card editor for SillyTavern V3.">
    <meta name="twitter:image" content="https://hockey323.github.io/TavernQuill/og-image.png">
    <meta name="robots" content="index, follow">
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f1114" />
    <link rel="icon" type="image/png" href="favicon.png" />

    <!-- Initialise theme before first paint to prevent flash -->
    <script>
      (function() {
        var theme = 'dark';
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
          theme = 'light';
        }
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>

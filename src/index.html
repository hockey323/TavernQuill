<!doctype html>
<html lang="en-CA" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <title>TavernQuill — SillyTavern V3 Card Architect</title>
    <meta name="description" content="TavernQuill is a free, privacy-first SillyTavern V3 character card editor. Runs entirely in your browser — no server, no data upload." />
    <!-- Canonical -->
    <link rel="canonical" href="https://hockey323.github.io/TavernQuill/" />

    <!-- Discovery & authorship -->
    <meta name="author" content="hockey323" />
    <meta name="application-name" content="TavernQuill" />
    <meta name="keywords" content="SillyTavern, character card, V3 card, chara card, LLM character, character editor, TavernQuill, roleplay, AI character, PNG metadata" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:title" content="TavernQuill — SillyTavern V3 Card Architect" />
    <meta property="og:description" content="Build and refine LLM character cards with a modern, accessible Angular editor. Full V3 spec support, lorebooks, and PNG metadata — all in-browser." />
    <meta property="og:url" content="https://hockey323.github.io/TavernQuill/" />
    <meta property="og:image" content="https://hockey323.github.io/TavernQuill/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="TavernQuill — SillyTavern V3 character card editor" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_CA" />
    <meta property="og:site_name" content="TavernQuill" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TavernQuill — SillyTavern V3 Card Architect" />
    <meta name="twitter:description" content="A privacy-first, client-side character card editor for SillyTavern V3. No server, no upload — runs entirely in your browser." />
    <meta name="twitter:image" content="https://hockey323.github.io/TavernQuill/og-image.png" />
    <meta name="twitter:image:alt" content="TavernQuill logo — glowing quill pen on dark background" />

    <!-- JSON-LD: WebApplication schema for rich results & LLM crawlers -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "TavernQuill",
      "url": "https://hockey323.github.io/TavernQuill/",
      "description": "A free, privacy-first SillyTavern V3 character card editor. Build, edit, and export chara cards with full V3 spec support, lorebooks, and PNG metadata embedding — all in your browser, no server required.",
      "applicationCategory": "UtilitiesApplication",
      "operatingSystem": "Any",
      "browserRequirements": "Requires a modern browser with JavaScript enabled",
      "inLanguage": "en-CA",
      "isAccessibleForFree": true,
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "SillyTavern V3 character card creation",
        "Lorebook editor",
        "PNG metadata embedding and extraction",
        "V2 to V3 card upgrade",
        "Client-side only — no data uploaded",
        "Dark and light theme support"
      ],
      "screenshot": "https://hockey323.github.io/TavernQuill/og-image.png",
      "author": {
        "@type": "Person",
        "name": "hockey323",
        "url": "https://github.com/hockey323"
      },
      "codeRepository": "https://github.com/hockey323/TavernQuill",
      "license": "https://github.com/hockey323/TavernQuill/blob/main/LICENSE"
    }
    </script>
    <base href="/TavernQuill/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f1114" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f5f3ef" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/png" href="favicon.png" />

    <!-- Initialise theme before first paint to prevent flash -->
    <script>
      (function() {
        var theme = 'dark';
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
          theme = 'light';
        }
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
